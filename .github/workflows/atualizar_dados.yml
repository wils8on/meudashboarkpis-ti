name: Atualizar Dados do TomTicket

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar coletor de chamados
        env:
          TOMTICKET_TOKEN: ${{ secrets.TOMTICKET_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");

          async function coletarDados() {
            const token = process.env.TOMTICKET_TOKEN;
            if (!token) {
              console.error("Token do TomTicket não encontrado!");
              process.exit(1);
            }

            let pagina = 1;
            let todosChamados = [];

            console.log("Iniciando coleta automatizada...");

            while (true) {
              console.log(`\x1b[33mBuscando página ${pagina}...\x1b[0m`);
              
              try {
                const url = `https://api.tomticket.com/v2.0/ticket/list/${pagina}`;
                const response = await fetch(url, {
                  method: "GET",
                  headers: {
                    "Authorization": `Bearer ${token}`,
                    "Accept": "application/json"
                  }
                });

                if (!response.ok) {
                  throw new Error(`Resposta HTTP inválida: ${response.status}`);
                }

                const json = await response.json();
                
                // Localiza a lista de chamados independentemente do formato da API
                let chamadosPagina = [];
                if (Array.isArray(json)) {
                  chamadosPagina = json;
                } else if (json && Array.isArray(json.data)) {
                  chamadosPagina = json.data;
                } else if (json && Array.isArray(json.chamados)) {
                  chamadosPagina = json.chamados;
                }

                if (chamadosPagina.length === 0) {
                  console.log("Nenhum registro retornado nesta página. Coleta concluída.");
                  break;
                }

                todosChamados.push(...chamadosPagina);
                console.log(`Página ${pagina} processada. Total acumulado: ${todosChamados.length}`);

                // Se retornou menos de 50 registros, é a última página
                if (chamadosPagina.length < 50) {
                  console.log("Última página alcançada.");
                  break;
                }

                pagina++;
                
                // Limite de segurança de 150 páginas (~7500 chamados)
                if (pagina > 150) {
                  console.log("Atingido limite de segurança de páginas.");
                  break;
                }

              } catch (error) {
                console.error(`Erro ao buscar página ${pagina}:`, error.message);
                process.exit(1);
              }
            }

            // Grava o arquivo final estruturado
            const resultadoFinal = { data: todosChamados };
            fs.writeFileSync("dados.json", JSON.stringify(resultadoFinal, null, 2));
            console.log(`\x1b[32mSucesso total! Arquivo dados.json gerado com ${todosChamados.length} chamados.\x1b[0m`);
          }

          coletarDados();
          '

      - name: Salvar e publicar os dados atualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dados.json
          git diff-index --quiet HEAD || git commit -m "data: Sincronização robusta de todos os chamados da API"
          git push
