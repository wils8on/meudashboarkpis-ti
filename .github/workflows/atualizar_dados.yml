name: Atualizar Dados do TomTicket

on:
  schedule:
    # Agenda para rodar de 20 em 20 minutos automaticamente
    - cron: "*/20 * * * *"
  workflow_dispatch: # Permite forçar a execução manual pelo botão no GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Consultar API v2.0 do TomTicket e gerar JSON
        run: |
          # Consulta a API v2.0 enviando o Token de forma oculta e extremamente segura por cabeçalho (Bearer)
          curl -X GET "https://api.tomticket.com/v2.0/ticket/list" \
          -H "Authorization: Bearer ${{ secrets.TOMTICKET_TOKEN }}" \
          -H "Accept: application/json" \
          -o dados.json

      - name: Salvar e publicar os dados atualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dados.json
          # Só faz o commit se houver diferença real nos dados
          git diff-index --quiet HEAD || git commit -m "data: Atualização automatizada dos chamados"
          git push
