name: Atualizar Dados do TomTicket

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar coletor de chamados
        env:
          TOMTICKET_TOKEN: ${{ secrets.TOMTICKET_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");

          async function coletarDados() {
            const token = process.env.TOMTICKET_TOKEN;
            if (!token) {
              console.error("❌ ERRO: O segredo TOMTICKET_TOKEN não está cadastrado no GitHub!");
              process.exit(1);
            }

            let pagina = 1;
            let todosChamados = [];

            console.log("🚀 Iniciando coleta automatizada v2.0...");

            while (true) {
              console.log(`📡 Buscando página ${pagina}...`);
              
              try {
                const url = `https://api.tomticket.com/v2.0/ticket/list/${pagina}`;
                const response = await fetch(url, {
                  method: "GET",
                  headers: {
                    "Authorization": `Bearer ${token}`,
                    "Accept": "application/json"
                  }
                });

                // Se a API recusar a requisição (ex: Token inválido ou URL errada)
                if (!response.ok) {
                  const textoErro = await response.text();
                  console.error(`❌ Erro na requisição (Página ${pagina}): Status HTTP ${response.status}`);
                  console.error(`📝 Resposta do servidor do TomTicket:`, textoErro);
                  process.exit(1);
                }

                const json = await response.json();
                
                let chamadosPagina = [];
                if (Array.isArray(json)) {
                  chamadosPagina = json;
                } else if (json && Array.isArray(json.data)) {
                  chamadosPagina = json.data;
                } else if (json && Array.isArray(json.chamados)) {
                  chamadosPagina = json.chamados;
                }

                if (chamadosPagina.length === 0) {
                  console.log("✅ Nenhum registro retornado nesta página. Coleta concluída.");
                  break;
                }

                todosChamados.push(...chamadosPagina);
                console.log(`🔹 Página ${pagina} processada. Total acumulado: ${todosChamados.length}`);

                if (chamadosPagina.length < 50) {
                  console.log("🏁 Última página alcançada.");
                  break;
                }

                pagina++;
                
                if (pagina > 150) {
                  console.log("⚠️ Limite máximo de segurança de páginas atingido.");
                  break;
                }

              } catch (error) {
                console.error(`💥 Falha crítica de conexão/conversão na página ${pagina}:`, error);
                process.exit(1);
              }
            }

            const resultadoFinal = { data: todosChamados };
            fs.writeFileSync("dados.json", JSON.stringify(resultadoFinal, null, 2));
            console.log(`🎉 Sucesso total! dados.json gerado com ${todosChamados.length} chamados.`);
          }

          coletarDados();
          '

      - name: Salvar e publicar os dados atualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dados.json
          git diff-index --quiet HEAD || git commit -m "data: Sincronização robusta de todos os chamados da API"
          git push
