<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de KPIs</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2><i class="fa-solid fa-chart-line"></i> KPI Analytics</h2>
            <p>Entre com suas credenciais para acessar o painel.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" required placeholder="Digite seu usuário">
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="Digite sua senha">
                </div>

                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="btn-login">Acessar Plataforma</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
