<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KPI Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            --accent-neon: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotate(15deg);
            z-index: 1;
            pointer-events: none;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-sizing: border-box;
            z-index: 2;
            position: relative;
        }

        .brand-title {
            color: var(--text-main);
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .brand-title i {
            color: var(--accent-neon);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 13.5px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-google {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .btn-google img {
            width: 20px;
        }

        .btn-google:hover {
            background: rgba(56, 189, 248, 0.08);
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .error-message {
            color: #fda4af;
            margin-top: 25px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            background: rgba(244, 63, 94, 0.1);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(244, 63, 94, 0.2);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">
            <i class="fa-solid fa-chart-simple"></i> KPI ANALYTICS
        </div>
        <div class="brand-subtitle">
            INITIALIZING SECURE PROTOCOL<br>
            Autentique sua conta ID Google para descriptografar os dados.
        </div>
        
        <button id="btnGoogleLogin" class="btn-google">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
            Conectar ID Operacional
        </button>
        
        <div id="msgErroLogin" class="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCPuIhfgOQ3xbZTyqF8geD4f_7ewagWgH8",
            authDomain: "dasboard-kpis.firebaseapp.com",
            projectId: "dasboard-kpis",
            storageBucket: "dasboard-kpis.firebasestorage.app",
            messagingSenderId: "410198778836",
            appId: "1:410198778836:web:4c27dfc67d5c61f283ec41"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btnGoogleLogin').addEventListener('click', () => {
            const errorDiv = document.getElementById('msgErroLogin');
            errorDiv.style.display = 'none';

            // Usamos Janela Pop-up para evitar bloqueios de cookies do GitHub Pages
            signInWithPopup(auth, provider)
                .then(async (result) => {
                    const user = result.user;
                    
                    // Consulta no banco Firestore se este e-mail está autorizado
                    const userDoc = await getDoc(doc(db, "usuarios_autorizados", user.email.toLowerCase()));
                    
                    if (userDoc.exists() && userDoc.data().status === "permitido") {
                        localStorage.setItem('logado', 'true');
                        localStorage.setItem('user_email', user.email);
                        localStorage.setItem('user_nome', user.displayName);
                        
                        window.location.href = 'dashboard.html';
                    } else {
                        errorDiv.textContent = "Acesso negado. ID operacional não catalogado no Firestore.";
                        errorDiv.style.display = 'block';
                        signOut(auth);
                    }
                })
                .catch((error) => {
                    errorDiv.style.display = 'block';
                    console.error(error);
                    
                    // Autodiagnóstico inteligente de erros
                    if (error.code === 'auth/unauthorized-domain') {
                        errorDiv.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <strong>Configuração pendente:</strong> Adicione o domínio <u>wils8on.github.io</u> na aba 'Authentication > Configurações > Domínios Autorizados' dentro do console do seu Firebase.`;
                    } else if (error.code === 'auth/popup-blocked') {
                        errorDiv.textContent = "O pop-up de login foi bloqueado pelo seu navegador. Por favor, permita pop-ups para este site.";
                    } else {
                        errorDiv.textContent = "Falha no link de dados: " + error.message;
                    }
                });
        });
    </script>
</body>
</html>
